name: Solana CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Cache Solana Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana/
            ~/.cargo/bin/
            target
          key: ${{ runner.os }}-solana-v1-${{ hashFiles('**/Anchor.toml') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          if ! command -v anchor &> /dev/null
          then
            cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
            avm install latest
            avm use latest
            echo "$HOME/.avm/bin" >> $GITHUB_PATH
          fi
          # Install surfpool from GitHub source for bun-based tests
          cargo install --git https://github.com/flyover-xyz/surfpool surfpool

      - name: Install JS Dependencies
        run: npm install

      - name: Run Anchor Tests
        run: anchor test