name: Solana CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Bun
        uses: oven-sh/setup-bun@v1

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev

      - name: Cache Solana Binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/solana/
            ~/.cargo/bin/
            target
          key: ${{ runner.os }}-solana-v1-${{ hashFiles('**/Anchor.toml') }}

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          if ! command -v anchor &> /dev/null
          then
            cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
            avm install latest
            avm use latest
            echo "$HOME/.avm/bin" >> $GITHUB_PATH
          fi

      - name: Install JS Dependencies
        run: npm install

      - name: Build and Test
        run: |
          # 1. Build first (Heavy lifting)
          anchor build
          
          # 2. Setup environment
          mkdir -p /home/runner/.config/solana
          solana-keygen new --no-bip39-passphrase --outfile /home/runner/.config/solana/id.json || true
          rm -rf .anchor/ledger
          
          # 3. Start validator (Visible logs for debugging)
          solana-test-validator --reset --quiet --ledger .anchor/ledger &
          
          # 4. Wait for Slot 1 (The true sign of life)
          echo "Waiting for validator to reach Slot 1..."
          for i in {1..60}; do
            SLOT=$(solana slot 2>/dev/null || echo "0")
            if [ "$SLOT" -gt 0 ]; then
              echo "Validator is ready at Slot $SLOT!"
              break
            fi
            sleep 1
          done
          
          # 5. Sync, Deploy and Test
          anchor keys sync
          anchor program deploy
          sleep 5
          bun test ./tests/automated_payroll.ts
        env:
          ANCHOR_PROVIDER_URL: http://127.0.0.1:8899
          ANCHOR_WALLET: /home/runner/.config/solana/id.json